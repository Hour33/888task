<!DOCTYPE html>
<html>
<head>
<title>Register</title>
</head>

<body>

<h2>Register</h2>

<input type="text" id="phone" placeholder="Phone"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="register()">Register</button>

<p id="msg"></p>

<script>

const SHEETY_URL="https://api.sheety.co/f7f2e9490f85889b2a23cbdcf031c17e/task2/task2";

async function register(){

const phone=document.getElementById("phone").value;
const password=document.getElementById("password").value;

if(!phone||!password){
document.getElementById("msg").innerText="Fill all fields";
return;
}

const data={
task2:{
phone:phone,
password:password,
balance:0
}
};

try{

let res=await fetch(SHEETY_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

if(res.ok){
document.getElementById("msg").innerText="Registration successful";
}else{
document.getElementById("msg").innerText="Error registering";
}

}catch(e){
document.getElementById("msg").innerText="Network error";
}

}

</script>

</body>
</html>
