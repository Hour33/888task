<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Hour33</title>
<style>
body{font-family:Arial;background:#fff;margin:0;display:flex;flex-direction:column;align-items:center}
.banner{width:100%;max-width:500px;margin-top:20px}
.banner img{width:100%;border-radius:12px}
.card{background:#fff;padding:25px;border-radius:20px;box-shadow:0 6px 18px rgba(0,0,0,0.1);width:90%;max-width:400px;margin-top:-25px;text-align:center;border:1px solid #ccc}
input{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #ccc}
button{width:100%;padding:12px;background:#4caf50;color:#fff;border:none;border-radius:8px;font-weight:bold;cursor:pointer;margin-top:10px}
button:hover{background:#43a047}
#msg{margin-top:10px;font-size:14px}
</style>
</head>

<body>
<div class="banner">
<img src="https://i.postimg.cc/Pq66mhjL/file-00000000848c71f4aefb45586e4fb843.png">
</div>

<div class="card">
<h2>Login</h2>

<input id="phone" type="text" placeholder="Account">
<input id="password" type="password" placeholder="Password">

<button id="loginBtn">Login</button>

<p>Don't have an account? <a href="register.html">Register</a></p>

<div id="msg"></div>
</div>

<script>
const backendUrl = "https://hour33-backend.onrender.com/login";

document.getElementById("loginBtn").addEventListener("click", async () => {
  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");
  msg.textContent = "";

  if (!phone || !password) {
    msg.style.color = "red";
    msg.textContent = "Please fill both fields";
    return;
  }

  msg.style.color = "#4caf50";
  msg.textContent = "Logging in...";

  try {
    const res = await fetch(backendUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ phone, password })
    });
    const data = await res.json();

    if (!data.success) {
      msg.style.color = "red";
      msg.textContent = data.message || "Login failed";
      return;
    }

    localStorage.setItem("loggedIn","true");
    msg.style.color = "#4caf50";
    msg.textContent = "Login successful! Redirecting...";
    setTimeout(() => location.href = "index.html", 500);

  } catch(err) {
    msg.style.color = "red";
    msg.textContent = "Network error: " + err.message;
  }
});
</script>
</body>
</html>
