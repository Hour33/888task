<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>

<body>

<h2>Login</h2>

<input type="text" id="phone" placeholder="Phone"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<script>

const SHEETY_URL="https://api.sheety.co/f7f2e9490f85889b2a23cbdcf031c17e/task2/task2";

async function login(){

const phone=document.getElementById("phone").value;
const password=document.getElementById("password").value;

if(!phone||!password){
document.getElementById("msg").innerText="Fill all fields";
return;
}

try{

let res=await fetch(SHEETY_URL);
let data=await res.json();

let users=data.task2;

let user=users.find(u=>u.phone===phone && u.password===password);

if(user){

localStorage.setItem("user",phone);

document.getElementById("msg").innerText="Login successful";

setTimeout(()=>{
window.location.href="index.html";
},1000);

}else{

document.getElementById("msg").innerText="Invalid login";

}

}catch(e){

document.getElementById("msg").innerText="Network error";

}

}

</script>

</body>
</html>
